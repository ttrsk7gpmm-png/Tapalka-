<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crystal Clicker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(
        180deg,
        #3d1a78 0%,
        #6a3cc9 30%,
        #ff7b54 100%
    );
    color:white;
}

.topbar{
    display:flex;
    justify-content:space-between;
    padding:15px;
    gap:10px;
}

.stat{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(8px);
    border-radius:18px;
    padding:10px;
    min-width:105px;
    text-align:center;
}

.stat img{
    width:28px;
    height:28px;
    object-fit:contain;
}

.center{
    display:flex;
    justify-content:center;
    align-items:center;
    height:48vh;
}

#crystal{
    width:240px;
    cursor:pointer;
    transition:0.08s;
    filter:
        drop-shadow(0 0 15px #ffffff)
        drop-shadow(0 0 35px #a855f7);
}

#crystal:active{
    transform:scale(0.93);
}

.tap-text{
    position:absolute;
    font-size:22px;
    font-weight:bold;
    animation:floatUp 0.8s forwards;
    pointer-events:none;
}

@keyframes floatUp{
    from{
        opacity:1;
        transform:translateY(0);
    }
    to{
        opacity:0;
        transform:translateY(-80px);
    }
}

.bottom{
    position:absolute;
    bottom:15px;
    width:100%;
    padding:15px;
}

.cards{
    display:flex;
    gap:10px;
    overflow-x:auto;
}

.card{
    min-width:180px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:12px;
}

.card button{
    margin-top:8px;
    width:100%;
    border:none;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

.actions{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.actions button{
    flex:1;
    border:none;
    border-radius:16px;
    padding:12px;
    font-weight:bold;
    cursor:pointer;
}

.energybar{
    width:100%;
    height:12px;
    background:rgba(255,255,255,0.2);
    border-radius:20px;
    overflow:hidden;
    margin-top:8px;
}

.energyfill{
    height:100%;
    width:100%;
    background:#5cff87;
}

h3{
    margin-bottom:5px;
}
</style>
</head>

<body>

<div class="topbar">

    <div class="stat">
        <img src="IMG_0668.webp">
        <div id="gold">0</div>
        <small>Золото</small>
    </div>

    <div class="stat">
        <div id="energyText">1000/1000</div>
        <small>Энергия</small>

        <div class="energybar">
            <div class="energyfill" id="energyFill"></div>
        </div>
    </div>

    <div class="stat">
        <img src="IMG_0669.webp">
        <div id="diamonds">0</div>
        <small>Алмазы</small>
    </div>

</div>

<div class="center">

<img src="IMG_0667.webp" id="crystal">

</div>

<div class="bottom">

<div class="actions">
<button onclick="exchangeGold()">
Обменять 10000 золота → 5 💎
</button>

<button onclick="dailyReward()">
Ежедневный бонус
</button>
</div>

<div class="cards">

<div class="card">
<h3>Сильный тап</h3>
<p>+1 золото за тап</p>
<p>Цена: <span id="tapCost">100</span></p>
<button onclick="buyTapUpgrade()">
Купить
</button>
</div>

<div class="card">
<h3>Автошахта</h3>
<p>+1 золото/сек</p>
<p>Цена: <span id="autoCost">500</span></p>
<button onclick="buyAutoMine()">
Купить
</button>
</div>

<div class="card">
<h3>Энергоблок</h3>
<p>+250 энергии</p>
<p>Цена: <span id="energyCost">1000</span></p>
<button onclick="buyEnergyUpgrade()">
Купить
</button>
</div>

</div>
</div>

<script>

let gold = Number(localStorage.getItem("gold")) || 0;
let diamonds = Number(localStorage.getItem("diamonds")) || 0;

let tapPower = Number(localStorage.getItem("tapPower")) || 1;

let autoMine = Number(localStorage.getItem("autoMine")) || 0;

let maxEnergy = Number(localStorage.getItem("maxEnergy")) || 1000;

let energy = Number(localStorage.getItem("energy")) || maxEnergy;

let tapCost = Number(localStorage.getItem("tapCost")) || 100;
let autoCost = Number(localStorage.getItem("autoCost")) || 500;
let energyCost = Number(localStorage.getItem("energyCost")) || 1000;

function save(){
localStorage.setItem("gold",gold);
localStorage.setItem("diamonds",diamonds);
localStorage.setItem("tapPower",tapPower);
localStorage.setItem("autoMine",autoMine);
localStorage.setItem("maxEnergy",maxEnergy);
localStorage.setItem("energy",energy);
localStorage.setItem("tapCost",tapCost);
localStorage.setItem("autoCost",autoCost);
localStorage.setItem("energyCost",energyCost);
}

function update(){

document.getElementById("gold").innerText =
Math.floor(gold);

document.getElementById("diamonds").innerText =
diamonds;

document.getElementById("energyText").innerText =
Math.floor(energy)+"/"+maxEnergy;

document.getElementById("tapCost").innerText =
tapCost;

document.getElementById("autoCost").innerText =
autoCost;

document.getElementById("energyCost").innerText =
energyCost;

document.getElementById("energyFill").style.width =
(energy/maxEnergy*100)+"%";

save();
}

const crystal =
document.getElementById("crystal");

crystal.addEventListener("click",(e)=>{

if(energy < 1) return;

energy--;

gold += tapPower;

let text=document.createElement("div");
text.className="tap-text";
text.innerText="+"+tapPower;

text.style.left=e.pageX+"px";
text.style.top=e.pageY+"px";

document.body.appendChild(text);

setTimeout(()=>{
text.remove();
},800);

update();

});

function exchangeGold(){

if(gold < 10000){
alert("Недостаточно золота");
return;
}

gold -= 10000;
diamonds += 5;

update();
}

function buyTapUpgrade(){

if(gold < tapCost){
alert("Недостаточно золота");
return;
}

gold -= tapCost;

tapPower += 1;

tapCost =
Math.floor(tapCost*1.8);

update();
}

function buyAutoMine(){

if(gold < autoCost){
alert("Недостаточно золота");
return;
}

gold -= autoCost;

autoMine += 1;

autoCost =
Math.floor(autoCost*2);

update();
}

function buyEnergyUpgrade(){

if(gold < energyCost){
alert("Недостаточно золота");
return;
}

gold -= energyCost;

maxEnergy += 250;

energy += 250;

energyCost =
Math.floor(energyCost*2);

update();
}

function dailyReward(){

let last=
localStorage.getItem("dailyReward");

let now=
new Date().toDateString();

if(last===now){
alert("Сегодня бонус уже получен");
return;
}

gold += 500;

diamonds += 1;

localStorage.setItem(
"dailyReward",
now
);

update();

alert(
"Получено: 500 золота и 1 алмаз"
);
}

setInterval(()=>{

energy += 4;

if(energy > maxEnergy)
energy = maxEnergy;

gold += autoMine;

update();

},1000);

update();

</script>

</body>
</html>
