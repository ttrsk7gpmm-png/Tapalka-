<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Granny Horror Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: Arial, sans-serif;
            touch-action: manipulation;
            position: fixed;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 900px;
        }
        
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* Стартовый экран */
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        #startScreen h1 {
            font-size: clamp(36px, 8vw, 60px);
            color: #ff0000;
            text-shadow: 0 0 20px red;
            margin-bottom: 15px;
        }
        
        #startScreen .subtitle {
            font-size: clamp(14px, 3vw, 20px);
            color: #aaa;
            margin-bottom: 30px;
        }
        
        #startScreen .btn {
            background: #c00;
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 22px;
            border-radius: 10px;
            cursor: pointer;
            animation: pulse 1.5s infinite;
            margin: 10px;
        }
        
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        #startScreen .hint {
            font-size: 13px;
            color: #888;
            margin-top: 20px;
            line-height: 1.8;
        }
        
        /* Джойстик */
        #joystickZone {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 140px;
            height: 140px;
            z-index: 5;
        }
        
        #joystickBase {
            position: absolute;
            width: 140px;
            height: 140px;
            background: rgba(255,255,255,0.12);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        #joystickThumb {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: none;
        }
        
        /* Кнопки действий */
        .actionBtns {
            position: absolute;
            bottom: 40px;
            right: 20px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .actionBtn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        #btnRun {
            background: rgba(255,100,0,0.3);
            border-color: rgba(255,150,0,0.6);
        }
        
        #btnCrouch {
            background: rgba(0,100,255,0.3);
            border-color: rgba(100,150,255,0.6);
        }
        
        #btnInteract {
            background: rgba(255,255,0,0.3);
            border-color: rgba(255,255,100,0.6);
            font-size: 11px;
        }
        
        .actionBtn:active {
            background: rgba(255,255,255,0.4);
            transform: scale(0.9);
        }
        
        /* Сообщение */
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            display: none;
            pointer-events: none;
        }
        
        #message .big {
            font-size: clamp(30px, 6vw, 50px);
            font-weight: bold;
        }
        
        #message .small {
            font-size: clamp(14px, 3vw, 20px);
            color: white;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Стартовый экран -->
        <div id="startScreen">
            <h1>GRANNY HORROR</h1>
            <p class="subtitle">Выберитесь из дома...</p>
            <button class="btn" onclick="startGame()">▶ ИГРАТЬ</button>
            <div class="hint">
                🕹 Джойстик — движение<br>
                🟠 RUN — бег (шумно)<br>
                🔵 CROUCH — присесть (тихо)<br>
                🟡 РУКА — взять ключ / выход<br>
                <br>
                ⚠ Найди ключ и беги к двери!<br>
                👁 Берегись красных глаз...
            </div>
        </div>
        
        <!-- Джойстик -->
        <div id="joystickZone">
            <div id="joystickBase"></div>
            <div id="joystickThumb"></div>
        </div>
        
        <!-- Кнопки -->
        <div class="actionBtns">
            <button class="actionBtn" id="btnRun">RUN</button>
            <button class="actionBtn" id="btnCrouch">CROUCH</button>
            <button class="actionBtn" id="btnInteract">👋</button>
        </div>
        
        <!-- Сообщение -->
        <div id="message">
            <div class="big" id="msgBig"></div>
            <div class="small" id="msgSmall"></div>
        </div>
    </div>

    <script>
        // ==================== ХОЛСТ ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // ==================== ИГРОВЫЕ ПЕРЕМЕННЫЕ ====================
        let gameState = 'start'; // start, playing, caught, win
        let player, monster, walls, furniture, key, door, noise;
        
        // Джойстик
        let joystickActive = false;
        let joystickDX = 0;
        let joystickDY = 0;
        let joystickId = null;
        
        // Кнопки
        let runPressed = false;
        let crouchPressed = false;
        
        // ==================== КЛАССЫ ====================
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.w = 16;
                this.h = 28;
                this.speed = 2.5;
                this.runSpeed = 4.5;
                this.crouchSpeed = 1.3;
                this.hasKey = false;
                this.crouching = false;
            }
            
            getRect() {
                return {
                    x: this.x - this.w/2,
                    y: this.y - (this.crouching ? 14 : this.h)/2,
                    w: this.w,
                    h: this.crouching ? 14 : this.h
                };
            }
            
            move() {
                let dx = joystickDX;
                let dy = joystickDY;
                
                if (!joystickActive || (dx === 0 && dy === 0)) {
                    noise = Math.max(0, noise - 0.5);
                    return;
                }
                
                let speed = this.speed;
                noise = Math.max(0, noise - 0.3);
                
                if (runPressed) {
                    speed = this.runSpeed;
                    noise = Math.min(100, noise + 2.5);
                }
                
                if (crouchPressed) {
                    this.crouching = true;
                    speed = this.crouchSpeed;
                    noise = Math.max(0, noise - 0.5);
                } else {
                    this.crouching = false;
                }
                
                // Нормализация
                let mag = Math.sqrt(dx*dx + dy*dy);
                if (mag > 1) {
                    dx /= mag;
                    dy /= mag;
                }
                
                let newX = this.x + dx * speed;
                let newY = this.y + dy * speed;
                
                let testRect = this.getRect();
                testRect.x = newX - this.w/2;
                if (!this.collides(testRect)) this.x = newX;
                
                testRect = this.getRect();
                testRect.y = newY - (this.crouching ? 14 : this.h)/2;
                if (!this.collides(testRect)) this.y = newY;
                
                this.x = Math.max(25, Math.min(canvas.width - 25, this.x));
                this.y = Math.max(25, Math.min(canvas.height - 25, this.y));
            }
            
            collides(rect) {
                for (let w of walls) if (this.overlap(rect, w)) return true;
                for (let f of furniture) if (this.overlap(rect, f)) return true;
                return false;
            }
            
            overlap(a, b) {
                return a.x < b.x + b.w && a.x + a.w > b.x &&
                       a.y < b.y + b.h && a.y + a.h > b.y;
            }
        }
        
        class Monster {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.w = 26;
                this.h = 38;
                this.speed = 2;
                this.chaseSpeed = 4;
                this.state = 'patrol';
                this.patrolPoints = [];
                this.patrolIndex = 0;
                this.searchTimer = 0;
                this.searchTarget = null;
                this.visionRange = 300;
                this.hearingRange = 180;
                this.eyeGlow = 0;
            }
            
            getRect() {
                return {x: this.x-this.w/2, y: this.y-this.h/2, w: this.w, h: this.h};
            }
            
            update() {
                this.eyeGlow += 0.1;
                
                let dx = player.x - this.x;
                let dy = player.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (this.overlap(this.getRect(), player.getRect())) {
                    gameState = 'caught';
                    return;
                }
                
                if (this.state === 'chase') {
                    this.moveToward(player.x, player.y);
                    if (dist > this.visionRange) {
                        this.state = 'search';
                        this.searchTarget = {x: player.x, y: player.y};
                        this.searchTimer = 150;
                    }
                } else if (this.state === 'search') {
                    if (this.searchTimer > 0 && this.searchTarget) {
                        this.searchTimer--;
                        if (this.moveToward(this.searchTarget.x, this.searchTarget.y)) {
                            this.searchTarget = null;
                        }
                    } else {
                        this.state = 'patrol';
                    }
                } else {
                    if (this.patrolPoints.length > 0) {
                        let t = this.patrolPoints[this.patrolIndex];
                        if (this.moveToward(t.x, t.y)) {
                            this.patrolIndex = (this.patrolIndex + 1) % this.patrolPoints.length;
                        }
                    }
                }
                
                if (dist < this.visionRange && this.hasLineOfSight(player.x, player.y)) {
                    this.state = 'chase';
                }
                
                if (noise > 50 && dist < this.hearingRange) {
                    this.state = 'chase';
                }
            }
            
            moveToward(tx, ty) {
                let dx = tx - this.x;
                let dy = ty - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 4) return true;
                
                let speed = this.state === 'chase' ? this.chaseSpeed : this.speed;
                dx = dx/dist * speed;
                dy = dy/dist * speed;
                
                let testRect = this.getRect();
                testRect.x = this.x + dx - this.w/2;
                if (!this.collides(testRect)) this.x += dx;
                
                testRect = this.getRect();
                testRect.y = this.y + dy - this.h/2;
                if (!this.collides(testRect)) this.y += dy;
                
                return false;
            }
            
            collides(r) {
                for (let w of walls) if (this.overlap(r, w)) return true;
                for (let f of furniture) if (this.overlap(r, f)) return true;
                return false;
            }
            
            hasLineOfSight(tx, ty) {
                let dx = tx - this.x, dy = ty - this.y;
                let dist = Math.sqrt(dx*dx+dy*dy);
                let steps = Math.floor(dist / 8);
                for (let i = 1; i < steps; i++) {
                    let cx = this.x + dx*(i/steps), cy = this.y + dy*(i/steps);
                    let cr = {x: cx-2, y: cy-2, w: 4, h: 4};
                    for (let w of walls) if (this.overlap(cr, w)) return false;
                }
                return true;
            }
            
            overlap(a, b) {
                return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
            }
        }
        
        // ==================== УРОВЕНЬ ====================
        function createLevel() {
            const W = canvas.width, H = canvas.height;
            const m = 30; // отступ
            
            walls = [
                {x: m, y: m, w: 15, h: H-m*2},
                {x: W-m-15, y: m, w: 15, h: H-m*2},
                {x: m, y: m, w: W-m*2, h: 15},
                {x: m, y: H-m-15, w: W-m*2, h: 15},
                // Перегородки
                {x: m, y: H*0.48, w: W*0.35, h: 15},
                {x: W*0.45, y: H*0.48, w: W*0.55-m, h: 15},
                {x: W*0.5, y: m+15, w: 15, h: H*0.48-m-15},
                {x: W*0.5, y: H*0.48+15, w: 15, h: H*0.52-m-30},
            ];
            
            door = {x: W-35, y: H*0.42, w: 20, h: H*0.1};
            
            furniture = [
                {x: m+30, y: m+30, w: W*0.12, h: 30},
                {x: W*0.3, y: m+30, w: 30, h: W*0.1},
                {x: W*0.6, y: m+30, w: W*0.1, h: W*0.1},
                {x: m+30, y: H*0.6, w: W*0.15, h: 35},
                {x: W*0.55, y: H*0.6, w: W*0.15, h: 40},
                {x: W*0.7, y: H*0.35, w: 35, h: W*0.12},
            ];
            
            let f = furniture[Math.floor(Math.random()*furniture.length)];
            key = {
                x: f.x + f.w/2 + (Math.random()-0.5)*f.w,
                y: f.y + f.h/2 + (Math.random()-0.5)*f.h,
                collected: false,
                size: 7
            };
        }
        
        function init() {
            player = new Player(canvas.width*0.35, canvas.height*0.55);
            monster = new Monster(canvas.width*0.65, canvas.height*0.5);
            noise = 0;
            createLevel();
            monster.patrolPoints = [
                {x: canvas.width*0.2, y: canvas.height*0.25},
                {x: canvas.width*0.4, y: canvas.height*0.2},
                {x: canvas.width*0.6, y: canvas.height*0.35},
                {x: canvas.width*0.75, y: canvas.height*0.6},
                {x: canvas.width*0.3, y: canvas.height*0.7},
            ];
        }
        
        // ==================== ОТРИСОВКА ====================
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Пол
            for (let x = 30; x < canvas.width-30; x += 35) {
                for (let y = 30; y < canvas.height-30; y += 35) {
                    ctx.fillStyle = ((Math.floor(x/35)+Math.floor(y/35))%2===0) ? '#2a2218' : '#1f1a12';
                    ctx.fillRect(x, y, 35, 35);
                }
            }
            
            // Стены
            for (let w of walls) {
                ctx.fillStyle = '#3a2718';
                ctx.fillRect(w.x, w.y, w.w, w.h);
                ctx.strokeStyle = '#1a0f07';
                ctx.lineWidth = 2;
                ctx.strokeRect(w.x, w.y, w.w, w.h);
            }
            
            // Мебель
            for (let f of furniture) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(f.x+3, f.y+3, f.w, f.h);
                ctx.fillStyle = '#5c3a1e';
                ctx.fillRect(f.x, f.y, f.w, f.h);
                ctx.strokeStyle = '#2a1506';
                ctx.lineWidth = 2;
                ctx.strokeRect(f.x, f.y, f.w, f.h);
            }
            
            // Дверь
            ctx.fillStyle = player.hasKey ? '#0a0' : '#6b0000';
            ctx.fillRect(door.x, door.y, door.w, door.h);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.strokeRect(door.x, door.y, door.w, door.h);
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.max(10, canvas.width/50)}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText('EXIT', door.x+door.w/2, door.y-4);
            
            // Ключ
            if (!key.collected) {
                let glow = Math.sin(Date.now()/300)*0.3+0.7;
                ctx.fillStyle = `rgba(255,255,0,${glow*0.5})`;
                ctx.beginPath();
                ctx.arc(key.x, key.y, key.size+7, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(key.x, key.y, key.size, 0, Math.PI*2);
                ctx.fill();
            }
            
            // Монстр
            let mx = monster.x, my = monster.y;
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.ellipse(mx, my, 13, 19, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(mx, my-21, 12, 0, Math.PI*2);
            ctx.fill();
            
            let glow = Math.abs(Math.sin(monster.eyeGlow))*0.5+0.5;
            ctx.fillStyle = `rgba(255,0,0,${glow*0.5})`;
            ctx.beginPath(); ctx.arc(mx-5, my-25, 8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(mx+5, my-25, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#f00';
            ctx.beginPath(); ctx.arc(mx-5, my-25, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(mx+5, my-25, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(mx-5, my-25, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(mx+5, my-25, 2, 0, Math.PI*2); ctx.fill();
            
            // Игрок
            let pr = player.getRect();
            ctx.fillStyle = '#36c';
            ctx.fillRect(pr.x, pr.y, pr.w, pr.h);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(pr.x, pr.y, pr.w, pr.h);
            
            // Темнота
            let grad = ctx.createRadialGradient(player.x, player.y, 30, player.x, player.y, 220);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(0.35, 'rgba(0,0,0,0.1)');
            grad.addColorStop(0.7, 'rgba(0,0,0,0.5)');
            grad.addColorStop(1, 'rgba(0,0,0,0.92)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // HUD
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(8, 8, canvas.width*0.35, 40);
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.max(11, canvas.width/55)}px Arial`;
            ctx.textAlign = 'left';
            ctx.fillText(`Шум: ${Math.floor(noise)}% | Ключ: ${player.hasKey?'ДА':'НЕТ'}`, 16, 32);
            
            // Индикатор шума
            ctx.fillStyle = '#333';
            ctx.fillRect(8, 50, canvas.width*0.35, 8);
            ctx.fillStyle = noise > 50 ? '#f00' : '#0f0';
            ctx.fillRect(8, 50, canvas.width*0.35*(noise/100), 8);
        }
        
        // ==================== ИГРОВОЙ ЦИКЛ ====================
        function update() {
            if (gameState !== 'playing') return;
            
            player.move();
            
            if (!key.collected) {
                let d = Math.sqrt((player.x-key.x)**2 + (player.y-key.y)**2);
                if (d < 22) {
                    key.collected = true;
                    player.hasKey = true;
                }
            }
            
            if (player.hasKey) {
                let dr = {x: door.x-8, y: door.y, w: door.w+16, h: door.h};
                if (player.overlap(player.getRect(), dr)) {
                    gameState = 'win';
                }
            }
            
            monster.update();
        }
        
        function gameLoop() {
            update();
            draw();
            
            const msg = document.getElementById('message');
            const msgBig = document.getElementById('msgBig');
            const msgSmall = document.getElementById('msgSmall');
            
            if (gameState === 'caught') {
                msg.style.display = 'block';
                msgBig.style.color = '#f00';
                msgBig.textContent = 'ВЫ ПОЙМАНЫ!';
                msgSmall.textContent = 'Нажмите ИГРАТЬ для перезапуска';
            } else if (gameState === 'win') {
                msg.style.display = 'block';
                msgBig.style.color = '#0f0';
                msgBig.textContent = 'ВЫ СБЕЖАЛИ!';
                msgSmall.textContent = 'Нажмите ИГРАТЬ для новой игры';
            } else {
                msg.style.display = 'none';
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        // ==================== УПРАВЛЕНИЕ ====================
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameState = 'playing';
            init();
        }
        
        // Джойстик
        const joystickZone = document.getElementById('joystickZone');
        const thumb = document.getElementById('joystickThumb');
        const base = document.getElementById('joystickBase');
        const maxDist = 40;
        
        function getJoystickPos(e) {
            const touch = e.touches[0];
            const rect = base.getBoundingClientRect();
            return {
                x: touch.clientX - rect.left - rect.width/2,
                y: touch.clientY - rect.top - rect.height/2
            };
        }
        
        joystickZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            joystickActive = true;
            const pos = getJoystickPos(e);
            const dist = Math.sqrt(pos.x*pos.x + pos.y*pos.y);
            const clampedDist = Math.min(dist, maxDist);
            const angle = Math.atan2(pos.y, pos.x);
            
            joystickDX = Math.cos(angle) * (dist / maxDist);
            joystickDY = Math.sin(angle) * (dist / maxDist);
            
            thumb.style.transform = `translate(calc(-50% + ${Math.cos(angle)*clampedDist}px), calc(-50% + ${Math.sin(angle)*clampedDist}px))`;
            joystickId = e.touches[0].identifier;
        });
        
        joystickZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!joystickActive) return;
            
            for (let t of e.touches) {
                if (t.identifier === joystickId) {
                    const rect = base.getBoundingClientRect();
                    const pos = {
                        x: t.clientX - rect.left - rect.width/2,
                        y: t.clientY - rect.top - rect.height/2
                    };
                    const dist = Math.sqrt(pos.x*pos.x + pos.y*pos.y);
                    const clampedDist = Math.min(dist, maxDist);
                    const angle = Math.atan2(pos.y, pos.x);
                    
                    joystickDX = Math.cos(angle) * (dist / maxDist);
                    joystickDY = Math.sin(angle) * (dist / maxDist);
                    
                    thumb.style.transform = `translate(calc(-50% + ${Math.cos(angle)*clampedDist}px), calc(-50% + ${Math.sin(angle)*clampedDist}px))`;
                }
            }
        });
        
        function resetJoystick() {
            joystickActive = false;
            joystickDX = 0;
            joystickDY = 0;
            joystickId = null;
            thumb.style.transform = 'translate(-50%, -50%)';
        }
        
        joystickZone.addEventListener('touchend', resetJoystick);
        joystickZone.addEventListener('touchcancel', resetJoystick);
        
        // Кнопки
        function setupBtn(id, pressVar) {
            const btn = document.getElementById(id);
            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if (pressVar === 'run') runPressed = true;
                if (pressVar === 'crouch') crouchPressed = true;
                if (pressVar === 'interact') {
                    if (!key.collected) {
                        let d = Math.sqrt((player.x-key.x)**2 + (player.y-key.y)**2);
                        if (d < 25) {
                            key.collected = true;
                            player.hasKey = true;
                        }
                    }
                }
            });
            btn.addEventListener('pointerup', (e) => {
                e.preventDefault();
                if (pressVar === 'run') runPressed = false;
                if (pressVar === 'crouch') crouchPressed = false;
            });
            btn.addEventListener('pointerleave', (e) => {
                if (pressVar === 'run') runPressed = false;
                if (pressVar === 'crouch') crouchPressed = false;
            });
        }
        
        setupBtn('btnRun', 'run');
        setupBtn('btnCrouch', 'crouch');
        setupBtn('btnInteract', 'interact');
        
        // Предотвращение зума
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('gesturechange', (e) => e.preventDefault());
        document.addEventListener('gestureend', (e) => e.preventDefault());
        
        // Кнопка ИГРАТЬ при перезапуске
        document.querySelector('#startScreen .btn').addEventListener('click', startGame);
        
        // Показываем кнопку ИГРАТЬ при game over
        setInterval(() => {
            if (gameState === 'caught' || gameState === 'win') {
                document.getElementById('startScreen').style.display = 'flex';
                document.querySelector('#startScreen .btn').textContent = '🔄 ИГРАТЬ СНОВА';
            }
        }, 500);
        
        // ==================== ЗАПУСК ====================
        init();
        gameLoop();
    </script>
</body>
</html>
