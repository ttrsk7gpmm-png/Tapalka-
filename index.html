<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Granny 3D Horror</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            touch-action: none;
            position: fixed;
            width: 100vw;
            height: 100vh;
        }
        canvas { display: block; }
        
        #startScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
            font-family: Arial;
        }
        #startScreen h1 { 
            color: #f00; 
            font-size: 50px; 
            text-shadow: 0 0 30px red; 
            margin-bottom: 20px; 
        }
        #startScreen button {
            background: #c00;
            color: white;
            border: none;
            padding: 15px 60px;
            font-size: 24px;
            border-radius: 10px;
            margin-top: 20px;
        }
        #startScreen .info {
            margin-top: 30px;
            font-size: 14px;
            color: #aaa;
            line-height: 1.8;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 50;
            pointer-events: none;
        }
        #joystickArea {
            width: 130px;
            height: 130px;
            pointer-events: auto;
        }
        #buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
        }
        #buttons button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 11px;
            font-weight: bold;
        }
        #btnRun { background: rgba(255,100,0,0.4); }
        #btnCrouch { background: rgba(0,100,255,0.4); }
        #btnInteract { background: rgba(255,255,0,0.4); }
        
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: Arial;
            text-align: center;
            z-index: 200;
            display: none;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>GRANNY 3D</h1>
        <p style="font-size:18px;">Выберитесь из дома...</p>
        <button onclick="startGame()">▶ ИГРАТЬ</button>
        <div class="info">
            🕹 Джойстик — ходьба<br>
            👆 Проведи по экрану — смотреть<br>
            🟠 RUN — бежать<br>
            🔵 CROUCH — присесть<br>
            🟡 ✋ — взять ключ / выход
        </div>
    </div>
    
    <div id="controls">
        <div id="joystickArea">
            <canvas id="joystickCanvas" width="130" height="130"></canvas>
        </div>
        <div id="buttons">
            <button id="btnRun">RUN</button>
            <button id="btnCrouch">CROUCH</button>
            <button id="btnInteract">✋</button>
        </div>
    </div>
    
    <div id="message">
        <div id="msgBig"></div>
        <div id="msgSmall" style="font-size:16px;margin-top:10px;"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // ==================== НАСТРОЙКИ ====================
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x0a0a0a, 5, 25);
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 50);
        camera.position.set(5, 1.6, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.5;
        document.body.appendChild(renderer.domElement);
        
        // Свет
        const ambientLight = new THREE.AmbientLight(0x111122, 0.3);
        scene.add(ambientLight);
        
        const flashlight = new THREE.SpotLight(0xffeedd, 8, 15, Math.PI/6, 0.3, 0.5);
        flashlight.position.set(0, 0, 0);
        flashlight.castShadow = true;
        flashlight.shadow.mapSize.width = 512;
        flashlight.shadow.mapSize.height = 512;
        scene.add(flashlight);
        
        // ==================== СОСТОЯНИЕ ИГРЫ ====================
        let gameState = 'start';
        let hasKey = false;
        let noise = 0;
        let runPressed = false;
        let crouchPressed = false;
        let playerVelocity = new THREE.Vector3();
        let playerSpeed = 3;
        const playerHeight = 1.7;
        const playerRadius = 0.4;
        
        // Джойстик
        let joystickActive = false;
        let joystickDX = 0, joystickDY = 0;
        let touchLookDX = 0, touchLookDY = 0;
        let isLooking = false;
        let yaw = 0, pitch = 0;
        
        // ==================== СОЗДАНИЕ ДОМА ====================
        const walls = [];
        const furnitureList = [];
        
        function createWall(x, z, w, d, h = 3) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x4a3020, 
                roughness: 0.9,
                metalness: 0.1
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x + w/2, h/2, z + d/2);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            walls.push({
                x: x, z: z, w: w, d: d,
                mesh: mesh
            });
        }
        
        function createFurniture(x, z, w, h, d, color = 0x5c3a1e) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x + w/2, h/2, z + d/2);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            furnitureList.push({
                x: x, z: z, w: w, d: d,
                mesh: mesh
            });
            return mesh;
        }
        
        function buildHouse() {
            // Пол
            const floorGeo = new THREE.PlaneGeometry(16, 14);
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x2a1a0a, 
                roughness: 0.9,
                side: THREE.DoubleSide
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI/2;
            floor.position.set(8, 0, 7);
            floor.receiveShadow = true;
            scene.add(floor);
            
            // Потолок
            const ceiling = new THREE.Mesh(floorGeo, new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 1 }));
            ceiling.rotation.x = Math.PI/2;
            ceiling.position.set(8, 3, 7);
            scene.add(ceiling);
            
            // Внешние стены
            createWall(0, 0, 16, 0.2);      // север
            createWall(0, 13.8, 16, 0.2);    // юг
            createWall(0, 0, 0.2, 14);       // запад
            createWall(15.8, 0, 0.2, 14);    // восток
            
            // Внутренние стены
            createWall(0, 7, 7, 0.2);        // перегородка левая
            createWall(8, 7, 8, 0.2);        // перегородка правая
            createWall(8, 0, 0.2, 7);        // вертикальная верх
            createWall(8, 7.2, 0.2, 6.8);    // вертикальная низ
            
            // Мебель
            createFurniture(1, 1.5, 1.5, 0.8, 0.8, 0x6b4423);  // стол
            createFurniture(3, 1, 0.5, 1.5, 1.2, 0x5c3a1e);    // шкаф
            createFurniture(9, 2, 1, 0.7, 1, 0x7b5533);        // тумба
            createFurniture(1.5, 9, 2, 0.5, 1.5, 0x4a3020);    // кровать
            createFurniture(9, 9, 1.8, 0.6, 1, 0x6b5030);      // диван
            createFurniture(5, 9, 0.7, 1.2, 0.7, 0x555555);    // холодильник
            createFurniture(12, 4, 0.6, 1.8, 1.2, 0x5c3a1e);   // книжный шкаф
            
            // Дверь выхода
            const doorGeo = new THREE.BoxGeometry(1, 2, 0.1);
            const doorMat = new THREE.MeshStandardMaterial({ 
                color: 0x006600,
                emissive: 0x003300,
                emissiveIntensity: 0.5
            });
            const door = new THREE.Mesh(doorGeo, doorMat);
            door.position.set(15.9, 1, 10);
            scene.add(door);
            door.userData = { isExit: true };
            
            // Ключ (жёлтый шарик)
            const keyGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const keyMat = new THREE.MeshStandardMaterial({ 
                color: 0xffd700, 
                emissive: 0xffaa00,
                emissiveIntensity: 0.8,
                roughness: 0.3
            });
            window.keyMesh = new THREE.Mesh(keyGeo, keyMat);
            window.keyMesh.position.set(1.75, 0.7, 2);
            scene.add(window.keyMesh);
            window.keyMesh.userData = { isKey: true };
            
            // Ковёр для ориентации
            const rugGeo = new THREE.PlaneGeometry(2, 1);
            const rugMat = new THREE.MeshStandardMaterial({ color: 0x8b0000, roughness: 1, side: THREE.DoubleSide });
            const rug = new THREE.Mesh(rugGeo, rugMat);
            rug.rotation.x = -Math.PI/2;
            rug.position.set(8, 0.01, 3.5);
            scene.add(rug);
        }
        
        // ==================== МОНСТР ====================
        let monster;
        let monsterState = 'patrol';
        let patrolIndex = 0;
        const patrolPoints = [
            new THREE.Vector3(3, 0, 3),
            new THREE.Vector3(10, 0, 3),
            new THREE.Vector3(10, 0, 10),
            new THREE.Vector3(3, 0, 10),
            new THREE.Vector3(6, 0, 6),
        ];
        let searchTarget = null;
        let searchTimer = 0;
        
        function createMonster() {
            const group = new THREE.Group();
            
            // Тело
            const bodyGeo = new THREE.CylinderGeometry(0.35, 0.4, 1.8, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.9;
            body.castShadow = true;
            group.add(body);
            
            // Голова
            const headGeo = new THREE.SphereGeometry(0.3, 8, 8);
            const headMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 2;
            head.castShadow = true;
            group.add(head);
            
            // Глаза (светящиеся красные)
            const eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
            const eyeMat = new THREE.MeshStandardMaterial({ 
                color: 0xff0000, 
                emissive: 0xff0000,
                emissiveIntensity: 2,
                roughness: 0.2
            });
            
            const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(-0.12, 2.05, -0.25);
            group.add(leftEye);
            
            const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(0.12, 2.05, -0.25);
            group.add(rightEye);
            
            group.position.set(10, 0, 5);
            scene.add(group);
            
            return {
                mesh: group,
                leftEye, rightEye,
                speed: 2.5,
                chaseSpeed: 4.5
            };
        }
        
        function checkCollision(x, z, radius = playerRadius) {
            // Стены
            for (let w of walls) {
                const closestX = Math.max(w.x, Math.min(x, w.x + w.w));
                const closestZ = Math.max(w.z, Math.min(z, w.z + w.d));
                const dx = x - closestX;
                const dz = z - closestZ;
                if (Math.sqrt(dx*dx + dz*dz) < radius) return true;
            }
            // Мебель
            for (let f of furnitureList) {
                const closestX = Math.max(f.x, Math.min(x, f.x + f.w));
                const closestZ = Math.max(f.z, Math.min(z, f.z + f.d));
                const dx = x - closestX;
                const dz = z - closestZ;
                if (Math.sqrt(dx*dx + dz*dz) < radius + 0.1) return true;
            }
            return false;
        }
        
        function updateMonster(delta) {
            if (!monster || gameState !== 'playing') return;
            
            const mPos = monster.mesh.position;
            const pPos = camera.position;
            const dx = pPos.x - mPos.x;
            const dz = pPos.z - mPos.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            
            // Столкновение с игроком
            if (dist < 0.8) {
                gameState = 'caught';
                return;
            }
            
            let target = null;
            
            if (monsterState === 'chase') {
                target = new THREE.Vector3(pPos.x, 0, pPos.z);
                if (dist > 12) {
                    monsterState = 'search';
                    searchTarget = new THREE.Vector3(pPos.x, 0, pPos.z);
                    searchTimer = 3;
                }
            } else if (monsterState === 'search') {
                if (searchTimer > 0 && searchTarget) {
                    searchTimer -= delta;
                    target = searchTarget;
                    if (new THREE.Vector3(mPos.x, 0, mPos.z).distanceTo(searchTarget) < 0.5) {
                        searchTarget = null;
                    }
                } else {
                    monsterState = 'patrol';
                }
            } else {
                target = patrolPoints[patrolIndex];
                if (new THREE.Vector3(mPos.x, 0, mPos.z).distanceTo(target) < 0.5) {
                    patrolIndex = (patrolIndex + 1) % patrolPoints.length;
                }
            }
            
            // Проверка видимости игрока
            if (dist < 12 && monsterState !== 'chase') {
                const dir = new THREE.Vector3(dx, 0, dz).normalize();
                const raycaster = new THREE.Raycaster(
                    new THREE.Vector3(mPos.x, 0.5, mPos.z),
                    dir,
                    0,
                    dist
                );
                const intersects = raycaster.intersectObjects(scene.children, true);
                let blocked = false;
                for (let inter of intersects) {
                    if (inter.object !== window.keyMesh && 
                        inter.object !== monster.mesh &&
                        inter.object !== camera &&
                        inter.distance < dist - 0.5) {
                        blocked = true;
                        break;
                    }
                }
                if (!blocked) {
                    monsterState = 'chase';
                }
            }
            
            // Слышит шум
            if (noise > 50 && dist < 8) {
                monsterState = 'chase';
            }
            
            // Движение к цели
            if (target) {
                const tdx = target.x - mPos.x;
                const tdz = target.z - mPos.z;
                const tdist = Math.sqrt(tdx*tdx + tdz*tdz);
                
                if (tdist > 0.1) {
                    const speed = (monsterState === 'chase' ? monster.chaseSpeed : monster.speed) * delta;
                    const moveX = (tdx / tdist) * Math.min(speed, tdist);
                    const moveZ = (tdz / tdist) * Math.min(speed, tdist);
                    
                    const newX = mPos.x + moveX;
                    const newZ = mPos.z + moveZ;
                    
                    if (!checkCollision(newX, mPos.z, 0.35)) mPos.x = newX;
                    if (!checkCollision(mPos.x, newZ, 0.35)) mPos.z = newZ;
                    
                    // Поворот монстра
                    monster.mesh.lookAt(new THREE.Vector3(mPos.x + tdx, 0, mPos.z + tdz));
                }
            }
            
            // Анимация глаз
            const glow = Math.abs(Math.sin(Date.now() * 0.005)) * 2 + 1;
            monster.leftEye.material.emissiveIntensity = glow;
            monster.rightEye.material.emissiveIntensity = glow;
        }
        
        // ==================== УПРАВЛЕНИЕ ====================
        const joystickCanvas = document.getElementById('joystickCanvas');
        const jctx = joystickCanvas.getContext('2d');
        
        function drawJoystick() {
            jctx.clearRect(0, 0, 130, 130);
            
            // База
            jctx.fillStyle = 'rgba(255,255,255,0.1)';
            jctx.strokeStyle = 'rgba(255,255,255,0.3)';
            jctx.lineWidth = 3;
            jctx.beginPath();
            jctx.arc(65, 65, 55, 0, Math.PI*2);
            jctx.fill();
            jctx.stroke();
            
            // Стик
            const sx = 65 + joystickDX * 40;
            const sy = 65 + joystickDY * 40;
            jctx.fillStyle = 'rgba(255,255,255,0.4)';
            jctx.beginPath();
            jctx.arc(sx, sy, 25, 0, Math.PI*2);
            jctx.fill();
        }
        
        let joystickTouchId = null;
        
        joystickCanvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            joystickTouchId = touch.identifier;
            updateJoystick(touch);
            joystickActive = true;
        });
        
        joystickCanvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let t of e.touches) {
                if (t.identifier === joystickTouchId) {
                    updateJoystick(t);
                }
            }
        });
        
        function updateJoystick(touch) {
            const rect = joystickCanvas.getBoundingClientRect();
            const cx = touch.clientX - rect.left - 65;
            const cy = touch.clientY - rect.top - 65;
            const dist = Math.sqrt(cx*cx + cy*cy);
            const maxDist = 40;
            const clamped = Math.min(dist, maxDist);
            
            if (dist > 5) {
                joystickDX = (cx / dist) * (clamped / maxDist);
                joystickDY = (cy / dist) * (clamped / maxDist);
            } else {
                joystickDX = 0;
                joystickDY = 0;
            }
        }
        
        function resetJoystick() {
            joystickActive = false;
            joystickDX = 0;
            joystickDY = 0;
            joystickTouchId = null;
        }
        
        joystickCanvas.addEventListener('touchend', resetJoystick);
        joystickCanvas.addEventListener('touchcancel', resetJoystick);
        
        // Взгляд по экрану
        renderer.domElement.addEventListener('touchstart', (e) => {
            if (e.target === joystickCanvas) return;
            if (e.touches.length === 1) {
                isLooking = true;
                touchLookDX = 0;
                touchLookDY = 0;
            }
        });
        
        renderer.domElement.addEventListener('touchmove', (e) => {
            if (!isLooking) return;
            e.preventDefault();
            if (e.touches.length === 1) {
                touchLookDX = e.touches[0].clientX - (e.touches[0].clientX - touchLookDX);
                yaw -= (e.touches[0].clientX - (window._lastLookX || e.touches[0].clientX)) * 0.003;
                pitch -= (e.touches[0].clientY - (window._lastLookY || e.touches[0].clientY)) * 0.003;
                window._lastLookX = e.touches[0].clientX;
                window._lastLookY = e.touches[0].clientY;
            }
        });
        
        renderer.domElement.addEventListener('touchend', () => {
            isLooking = false;
            window._lastLookX = null;
            window._lastLookY = null;
        });
        
        // Кнопки
        document.getElementById('btnRun').addEventListener('pointerdown', () => runPressed = true);
        document.getElementById('btnRun').addEventListener('pointerup', () => runPressed = false);
        document.getElementById('btnRun').addEventListener('pointerleave', () => runPressed = false);
        
        document.getElementById('btnCrouch').addEventListener('pointerdown', () => crouchPressed = true);
        document.getElementById('btnCrouch').addEventListener('pointerup', () => crouchPressed = false);
        document.getElementById('btnCrouch').addEventListener('pointerleave', () => crouchPressed = false);
        
        document.getElementById('btnInteract').addEventListener('pointerdown', () => {
            // Проверка близости к ключу
            if (window.keyMesh && !hasKey) {
                const dist = camera.position.distanceTo(window.keyMesh.position);
                if (dist < 1.5) {
                    hasKey = true;
                    scene.remove(window.keyMesh);
                    window.keyMesh = null;
                }
            }
            // Проверка близости к двери
            if (hasKey) {
                const doorDist = Math.abs(camera.position.x - 15.9) + Math.abs(camera.position.z - 10);
                if (doorDist < 2 && camera.position.x > 14) {
                    gameState = 'win';
                }
            }
        });
        
        // ==================== ОСНОВНОЙ ЦИКЛ ====================
        let lastTime = performance.now();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const now = performance.now();
            const delta = Math.min((now - lastTime) / 1000, 0.1);
            lastTime = now;
            
            drawJoystick();
            
            if (gameState === 'playing') {
                // Шум
                noise = Math.max(0, noise - delta * 10);
                if (runPressed) noise = Math.min(100, noise + delta * 80);
                if (crouchPressed) noise = Math.max(0, noise - delta * 20);
                
                // Скорость игрока
                let speed = playerSpeed;
                if (runPressed) speed = 5.5;
                if (crouchPressed) {
                    speed = 1.5;
                    camera.position.y = 0.8;
                } else {
                    camera.position.y = playerHeight;
                }
                
                // Движение
                if (joystickActive && (Math.abs(joystickDX) > 0.1 || Math.abs(joystickDY) > 0.1)) {
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    forward.y = 0;
                    forward.normalize();
                    
                    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                    right.y = 0;
                    right.normalize();
                    
                    const moveX = (right.x * joystickDX + forward.x * joystickDY) * speed * delta;
                    const moveZ = (right.z * joystickDX + forward.z * joystickDY) * speed * delta;
                    
                    const newX = camera.position.x + moveX;
                    const newZ = camera.position.z + moveZ;
                    
                    if (!checkCollision(newX, camera.position.z)) camera.position.x = newX;
                    if (!checkCollision(camera.position.x, newZ)) camera.position.z = newZ;
                }
                
                // Ограничение камеры
                camera.position.x = Math.max(0.4, Math.min(15.6, camera.position.x));
                camera.position.z = Math.max(0.4, Math.min(13.6, camera.position.z));
                
                // Поворот камеры
                pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
                camera.rotation.order = 'YXZ';
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;
                
                // Фонарик
                flashlight.position.copy(camera.position);
                flashlight.target.position.copy(
                    camera.position.clone().add(
                        new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion)
                    )
                );
                flashlight.target.updateMatrixWorld();
                
                // Монстр
                updateMonster(delta);
                
                // Проверка выхода
                if (hasKey && camera.position.x > 15.2 && Math.abs(camera.position.z - 10) < 0.8) {
                    gameState = 'win';
                }
            }
            
            // Сообщения
            const msg = document.getElementById('message');
            if (gameState === 'caught') {
                msg.style.display = 'block';
                document.getElementById('msgBig').innerHTML = '<span style="color:#f00;">ВЫ ПОЙМАНЫ!</span>';
                document.getElementById('msgSmall').textContent = 'Нажмите ИГРАТЬ для перезапуска';
            } else if (gameState === 'win') {
                msg.style.display = 'block';
                document.getElementById('msgBig').innerHTML = '<span style="color:#0f0;">ВЫ СБЕЖАЛИ!</span>';
                document.getElementById('msgSmall').textContent = 'Нажмите ИГРАТЬ для перезапуска';
            } else {
                msg.style.display = 'none';
            }
            
            if (gameState === 'caught' || gameState === 'win') {
                document.getElementById('startScreen').style.display = 'flex';
                document.querySelector('#startScreen button').textContent = '🔄 ИГРАТЬ СНОВА';
            }
            
            renderer.render(scene, camera);
        }
        
        // ==================== ЗАПУСК ====================
        window.startGame = function() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('message').style.display = 'none';
            
            // Очистка сцены
            while(scene.children.length > 0) {
                scene.remove(scene.children[0]);
            }
            walls.length = 0;
            furnitureList.length = 0;
            
            // Пересоздание
            scene.add(ambientLight);
            scene.add(flashlight);
            scene.fog = new THREE.Fog(0x0a0a0a, 5, 25);
            
            buildHouse();
            monster = createMonster();
            
            camera.position.set(5, playerHeight, 5);
            yaw = 0;
            pitch = 0;
            hasKey = false;
            noise = 0;
            gameState = 'playing';
            monsterState = 'patrol';
            patrolIndex = 0;
            searchTarget = null;
            searchTimer = 0;
            
            lastTime = performance.now();
        };
        
        // Предзапуск
        buildHouse();
        monster = createMonster();
        animate();
        
        // Ресайз
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
